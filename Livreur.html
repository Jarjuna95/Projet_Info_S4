<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Détails de la Livraison</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="fond-image">

    <div class="page-centree">
        <form name="livraison" method="post" action="#" id="form-livraison">
            <fieldset id="card-livraison">
                <legend>Informations de livraison</legend>

                <div class="ligne-info">
                    <span class="label">N° Commande :</span>
                    <span class="donnee">123456789</span>
                </div>
                <div class="ligne-info">
                    <span class="label">Nom :</span>
                    <span class="donnee">Grignon</span>
                </div>
                <div class="ligne-info">
                    <span class="label">Prénom :</span>
                    <span class="donnee">Romuald</span>
                </div>
                <div class="ligne-info">
                    <span class="label">Email :</span>
                    <span class="donnee">romuald.grignon@etu.cyu.fr</span>
                </div>
                <div class="ligne-info">
                    <span class="label">Téléphone :</span>
                    <span class="donnee">07 99 99 99 99</span>
                </div>

                <div id="cadre-gris-adresse">
                    <p class="titre-cadre">Adresse de livraison</p>
                    <p>Son bureau</p>
                    <p>95000 Cergy</p>
                    <p>Appartement 1, RDC</p>
                    <a href="https://maps.google.com" target="_blank" id="lien-maps">Ouvrir dans Google Maps</a>
                </div>

                <div id="cadre-gris-instructions">
                    <p class="titre-cadre">Instructions</p>
                    <p>Déposer mon repas devant la porte.</p>
                </div>

                <input type="submit" value="TERMINER LA COMMANDE" id="btn-livraison-terminer" />
            </fieldset>
        </form>
    </div>
</body>
</html>
